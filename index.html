<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calingo MVP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .section {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .button {
      display: inline-block;
      margin-top: 16px;
      background: #0f766e;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .card {
      background: #f8fafc;
      border-radius: 14px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      margin-top: 20px;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section">
      <h1>Calingo MVP</h1>
      <p>This page is now connected to Supabase.</p>

      <div class="card">
        <h2>Profiles from database</h2>
        <button class="button" onclick="loadProfiles()">Load profiles</button>
        <p id="output" class="small">No data loaded yet.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = https://mvozeghkfifilibxrovz.supabase.co;
    const supabaseKey = sb_publishable_bZmsbFeAPMpTQaU67Sc7VA__g2ldDz0;

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadProfiles() {
      const output = document.getElementById("output");
      output.textContent = "Loading...";

      const { data, error } = await supabaseClient
        .from("profiles")
        .select("*");

      if (error) {
        output.textContent = "Error: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        output.textContent = "No profiles found.";
        return;
      }

      output.innerHTML = data.map(profile =>
        `${profile.name} — ${profile.email} — ${profile.role}`
      ).join("<br>");
    }
  </script>
</body>
</html>
